<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Connexion Comptabilité - Faculté Agronomique</title>
     <meta name="application-name" content="Unilu  Comptabilité">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="unilu Compta">
    <meta name="description" content="Gestion comptabilité">
    <meta name="theme-color" content="#003366">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icon-96x96.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #003366 0%, #001a33 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 450px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card {
            background: white;
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.35);
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #003366, #ffb347, #003366);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #003366, #002244);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 25px -5px rgba(0, 51, 102, 0.4);
        }
        
        .logo-icon i {
            font-size: 45px;
            color: #ffb347;
        }
        
        .logo h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 5px;
        }
        
        .logo p {
            font-size: 14px;
            color: #666;
            margin-bottom: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .input-group-custom {
            position: relative;
        }
        
        .input-group-custom i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #003366;
            font-size: 16px;
            z-index: 1;
        }
        
        .input-group-custom input {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        .input-group-custom input:focus {
            outline: none;
            border-color: #003366;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 51, 102, 0.1);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #003366, #002244);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 51, 102, 0.5);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .alert-custom {
            background: #f8d7da;
            color: #721c24;
            border-radius: 12px;
            padding: 12px 15px;
            font-size: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid #dc3545;
        }
        
        .info-text {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 13px;
            color: #888;
        }
        
        .info-text a {
            color: #003366;
            text-decoration: none;
            font-weight: 600;
        }
        
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 1;
            background: transparent;
            border: none;
            font-size: 18px;
        }
        
        .password-toggle:hover {
            color: #003366;
        }
        
        .toast-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            min-width: 300px;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.3s ease-in-out;
        }
        
        @media (max-width: 550px) {
            .login-card {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="toastContainer" class="toast-notification"></div>
    
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="bi bi-calculator-fill"></i>
                </div>
                <h2>Espace Comptabilité</h2>
                <p>Faculté Agronomique</p>
            </div>
            
            <div id="alertMessage" style="display: none;"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group-custom">
                        <i class="bi bi-envelope-fill"></i>
                        <input type="email" id="email" placeholder="Adresse email" required autocomplete="off">
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="input-group-custom">
                        <i class="bi bi-key-fill"></i>
                        <input type="password" id="password" placeholder="Mot de passe" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="bi bi-eye-slash" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
            </form>
            
            <div class="info-text">
                <i class="bi bi-shield-lock-fill"></i> Accès réservé aux agents de comptabilité<br>
              
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBb82N2-5ns7qKjQBAj5UvDW87s2PZ27F0",
            authDomain: "fsa-unilu.firebaseapp.com",
            projectId: "fsa-unilu",
            storageBucket: "fsa-unilu.firebasestorage.app",
            messagingSenderId: "36551990738",
            appId: "1:36551990738:web:e91fdcb53f8aab5d1b7c0b"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let loginInProgress = false;
        
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const bgColor = type === 'success' ? '#28a745' : (type === 'warning' ? '#ffc107' : '#dc3545');
            const textColor = type === 'warning' ? '#333' : 'white';
            const icon = type === 'success' ? 'check-circle-fill' : (type === 'warning' ? 'exclamation-triangle-fill' : 'x-circle-fill');
            
            const toastHtml = `
                <div class="toast" role="alert" style="background: ${bgColor}; color: ${textColor}; border-radius: 10px; margin-bottom: 10px; animation: slideInRight 0.3s ease-out;">
                    <div class="toast-body">
                        <i class="bi bi-${icon} me-2"></i>
                        ${message}
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('afterbegin', toastHtml);
            const toastElement = container.firstElementChild;
            setTimeout(() => toastElement.remove(), 4000);
        }
        
        function showAlert(message, isError = true) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.innerHTML = `
                <div class="alert-custom">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    ${message}
                </div>
            `;
            alertDiv.style.display = 'block';
            
            const loginCard = document.querySelector('.login-card');
            loginCard.classList.add('shake');
            setTimeout(() => loginCard.classList.remove('shake'), 300);
            
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 5000);
        }
        
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            }
        }
        
        async function login(event) {
            event.preventDefault();
            
            if (loginInProgress) return;
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showAlert('Veuillez remplir tous les champs');
                return;
            }
            
            loginInProgress = true;
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Connexion...';
            loginBtn.disabled = true;
            
            try {
                const snapshot = await db.collection('utilisateurs')
                    .where('email', '==', email)
                    .where('role', '==', 'comptabilite')
                    .get();
                
                if (snapshot.empty) {
                    showAlert('Email ou mot de passe incorrect');
                    loginInProgress = false;
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                    return;
                }
                
                let user = null;
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.motDePasse === password) {
                        user = { id: doc.id, ...data };
                    }
                });
                
                if (user) {
                    localStorage.setItem('utilisateurCompta', JSON.stringify(user));
                    showToast('Connexion réussie !', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showAlert('Email ou mot de passe incorrect');
                    loginInProgress = false;
                    loginBtn.innerHTML = originalText;
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Erreur connexion:', error);
                showAlert('Erreur lors de la connexion. Veuillez réessayer.');
                loginInProgress = false;
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', login);
        document.getElementById('email').focus();
        
        const utilisateurActuel = localStorage.getItem('utilisateurCompta');
        if (utilisateurActuel) {
            const user = JSON.parse(utilisateurActuel);
            if (user.role === 'comptabilite') {
                window.location.href = 'index.html';
            }
        }
    </script>
<script>

// Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    console.log('Service Worker enregistré:', reg.scope);
                }).catch(err => {
                    console.log('Erreur Service Worker:', err);
                });
            });
        }
</script>
</body>
</html>
